name: Manual Analysis

on:
  workflow_dispatch:
    inputs:
      nct_id:
        description: "ClinicalTrials.gov NCT identifier"
        required: true
        type: string
      approval_limit:
        description: "Maximum FDA approval records to include"
        required: false
        default: "5"
        type: string
      market_pre_days:
        description: "Trading days before event date"
        required: false
        default: "5"
        type: string
      market_post_days:
        description: "Trading days after event date"
        required: false
        default: "5"
        type: string
      include_raw_trial:
        description: "Include raw trial payload in the result"
        required: false
        default: false
        type: boolean
      save_to_db:
        description: "Persist the analysis snapshot to the database"
        required: false
        default: false
        type: boolean
      summary_only:
        description: "Output summary only instead of full analysis payload"
        required: false
        default: false
        type: boolean

concurrency:
  group: manual-analysis-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze-trial:
    name: Analyze Trial
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_TARGET: neon
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
      DATABASE_POOL_ENABLED: "false"
      DATABASE_APPLICATION_NAME: btq-manual-analysis
      SEC_CONTACT_NAME: ${{ secrets.SEC_CONTACT_NAME }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
      ANALYZE_NCT_ID: ${{ inputs.nct_id }}
      ANALYZE_APPROVAL_LIMIT: ${{ inputs.approval_limit }}
      ANALYZE_MARKET_PRE_DAYS: ${{ inputs.market_pre_days }}
      ANALYZE_MARKET_POST_DAYS: ${{ inputs.market_post_days }}
      ANALYZE_INCLUDE_RAW_TRIAL: ${{ inputs.include_raw_trial }}
      ANALYZE_SAVE_TO_DB: ${{ inputs.save_to_db }}
      ANALYZE_SUMMARY_ONLY: ${{ inputs.summary_only }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SEC_CONTACT_NAME:-}" ] || [ -z "${SEC_CONTACT_EMAIL:-}" ]; then
            echo "SEC_CONTACT_NAME and SEC_CONTACT_EMAIL must be configured as GitHub secrets."
            exit 1
          fi

          if [ "${ANALYZE_SAVE_TO_DB}" = "true" ]; then
            if [ -n "${DATABASE_URL:-}" ]; then
              echo "DATABASE_URL secret detected for persistence."
              exit 0
            fi

            if [ -z "${DB_HOST:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_USER:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
              echo "Database configuration is missing. Set DATABASE_URL or DB_HOST/DB_NAME/DB_USER/DB_PASSWORD secrets."
              exit 1
            fi

            echo "Database component secrets detected for persistence."
            exit 0
          fi

          echo "Persistence is disabled; database secrets are optional for this run."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run manual analysis
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs

          printf '%s\n' "Running command: python scripts/run_manual_analysis.py" | tee logs/manual_analysis.log
          set +e
          output="$(python scripts/run_manual_analysis.py 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output" | tee -a logs/manual_analysis.log
          printf '%s\n' "$output" > logs/manual_analysis_output.json
          exit "$status"

      - name: Publish workflow summary
        if: always()
        shell: bash
        env:
          MANUAL_ANALYSIS_OUTPUT_PATH: logs/manual_analysis_output.json
        run: |
          set -euo pipefail

          {
            echo "## Manual Analysis"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- NCT ID: \`${{ inputs.nct_id }}\`"
            echo "- Approval limit: \`${{ inputs.approval_limit }}\`"
            echo "- Market pre days: \`${{ inputs.market_pre_days }}\`"
            echo "- Market post days: \`${{ inputs.market_post_days }}\`"
            echo "- Include raw trial: \`${{ inputs.include_raw_trial }}\`"
            echo "- Save to DB: \`${{ inputs.save_to_db }}\`"
            echo "- Summary only: \`${{ inputs.summary_only }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f logs/manual_analysis_output.json ]; then
            python scripts/publish_manual_analysis_summary.py
          fi

name: Scheduled Backfill

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Optional free-text ClinicalTrials.gov query"
        required: false
        default: ""
        type: string
      status:
        description: "Overall status filter"
        required: false
        default: "COMPLETED"
        type: string
      phase:
        description: "Optional phase filter such as PHASE1, PHASE2, or PHASE3"
        required: false
        default: ""
        type: string
      study_type:
        description: "Study type filter"
        required: false
        default: ""
        type: string
      sponsor:
        description: "Optional sponsor filter"
        required: false
        default: ""
        type: string
      condition:
        description: "Condition filter"
        required: false
        default: "Neoplasms"
        type: string
      intervention:
        description: "Optional intervention filter"
        required: false
        default: ""
        type: string
      intervention_type:
        description: "Optional intervention type filter"
        required: false
        default: ""
        type: string
      country:
        description: "Optional country filter"
        required: false
        default: ""
        type: string
      has_results:
        description: "Restrict to studies with results"
        required: false
        default: true
        type: boolean
      without_results:
        description: "Restrict to studies without results"
        required: false
        default: false
        type: boolean
      page_size:
        description: "Page size per API request"
        required: false
        default: "50"
        type: string
      pages:
        description: "Maximum pages to ingest"
        required: false
        default: "2"
        type: string

concurrency:
  group: scheduled-backfill-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backfill-clinical-trials:
    name: Backfill Clinical Trials
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_TARGET: neon
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
      DATABASE_POOL_ENABLED: "false"
      DATABASE_APPLICATION_NAME: btq-backfill
      SEC_CONTACT_NAME: ${{ secrets.SEC_CONTACT_NAME }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
      INPUT_QUERY: ${{ inputs.query }}
      INPUT_STATUS: ${{ inputs.status }}
      INPUT_PHASE: ${{ inputs.phase }}
      INPUT_STUDY_TYPE: ${{ inputs.study_type }}
      INPUT_SPONSOR: ${{ inputs.sponsor }}
      INPUT_CONDITION: ${{ inputs.condition }}
      INPUT_INTERVENTION: ${{ inputs.intervention }}
      INPUT_INTERVENTION_TYPE: ${{ inputs.intervention_type }}
      INPUT_COUNTRY: ${{ inputs.country }}
      INPUT_HAS_RESULTS: ${{ inputs.has_results }}
      INPUT_WITHOUT_RESULTS: ${{ inputs.without_results }}
      INPUT_PAGE_SIZE: ${{ inputs.page_size }}
      INPUT_PAGES: ${{ inputs.pages }}
      DEFAULT_QUERY: ${{ vars.BACKFILL_QUERY }}
      DEFAULT_STATUS: ${{ vars.BACKFILL_STATUS }}
      DEFAULT_PHASE: ${{ vars.BACKFILL_PHASE }}
      DEFAULT_STUDY_TYPE: ${{ vars.BACKFILL_STUDY_TYPE }}
      DEFAULT_SPONSOR: ${{ vars.BACKFILL_SPONSOR }}
      DEFAULT_CONDITION: ${{ vars.BACKFILL_CONDITION }}
      DEFAULT_INTERVENTION: ${{ vars.BACKFILL_INTERVENTION }}
      DEFAULT_INTERVENTION_TYPE: ${{ vars.BACKFILL_INTERVENTION_TYPE }}
      DEFAULT_COUNTRY: ${{ vars.BACKFILL_COUNTRY }}
      DEFAULT_HAS_RESULTS: ${{ vars.BACKFILL_HAS_RESULTS }}
      DEFAULT_WITHOUT_RESULTS: ${{ vars.BACKFILL_WITHOUT_RESULTS }}
      DEFAULT_PAGE_SIZE: ${{ vars.BACKFILL_PAGE_SIZE }}
      DEFAULT_PAGES: ${{ vars.BACKFILL_PAGES }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SEC_CONTACT_NAME:-}" ] || [ -z "${SEC_CONTACT_EMAIL:-}" ]; then
            echo "SEC_CONTACT_NAME and SEC_CONTACT_EMAIL must be configured as GitHub secrets."
            exit 1
          fi

          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret detected."
            exit 0
          fi

          if [ -z "${DB_HOST:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_USER:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
            echo "Database configuration is missing. Set DATABASE_URL or DB_HOST/DB_NAME/DB_USER/DB_PASSWORD secrets."
            exit 1
          fi

          echo "Database component secrets detected."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve effective backfill configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          resolve_value() {
            local input_value="${1:-}"
            local default_value="${2:-}"
            local fallback_value="${3:-}"

            if [ -n "${input_value}" ]; then
              printf '%s' "${input_value}"
            elif [ -n "${default_value}" ]; then
              printf '%s' "${default_value}"
            else
              printf '%s' "${fallback_value}"
            fi
          }

          query="$(resolve_value "${INPUT_QUERY:-}" "${DEFAULT_QUERY:-}" "")"
          status="$(resolve_value "${INPUT_STATUS:-}" "${DEFAULT_STATUS:-}" "COMPLETED")"
          phase="$(resolve_value "${INPUT_PHASE:-}" "${DEFAULT_PHASE:-}" "")"
          study_type="$(resolve_value "${INPUT_STUDY_TYPE:-}" "${DEFAULT_STUDY_TYPE:-}" "")"
          sponsor="$(resolve_value "${INPUT_SPONSOR:-}" "${DEFAULT_SPONSOR:-}" "")"
          condition="$(resolve_value "${INPUT_CONDITION:-}" "${DEFAULT_CONDITION:-}" "Neoplasms")"
          intervention="$(resolve_value "${INPUT_INTERVENTION:-}" "${DEFAULT_INTERVENTION:-}" "")"
          intervention_type="$(resolve_value "${INPUT_INTERVENTION_TYPE:-}" "${DEFAULT_INTERVENTION_TYPE:-}" "")"
          country="$(resolve_value "${INPUT_COUNTRY:-}" "${DEFAULT_COUNTRY:-}" "")"
          has_results="$(resolve_value "${INPUT_HAS_RESULTS:-}" "${DEFAULT_HAS_RESULTS:-}" "true")"
          without_results="$(resolve_value "${INPUT_WITHOUT_RESULTS:-}" "${DEFAULT_WITHOUT_RESULTS:-}" "false")"
          page_size="$(resolve_value "${INPUT_PAGE_SIZE:-}" "${DEFAULT_PAGE_SIZE:-}" "50")"
          pages="$(resolve_value "${INPUT_PAGES:-}" "${DEFAULT_PAGES:-}" "2")"

          echo "query=${query}" >> "$GITHUB_OUTPUT"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "phase=${phase}" >> "$GITHUB_OUTPUT"
          echo "study_type=${study_type}" >> "$GITHUB_OUTPUT"
          echo "sponsor=${sponsor}" >> "$GITHUB_OUTPUT"
          echo "condition=${condition}" >> "$GITHUB_OUTPUT"
          echo "intervention=${intervention}" >> "$GITHUB_OUTPUT"
          echo "intervention_type=${intervention_type}" >> "$GITHUB_OUTPUT"
          echo "country=${country}" >> "$GITHUB_OUTPUT"
          echo "has_results=${has_results}" >> "$GITHUB_OUTPUT"
          echo "without_results=${without_results}" >> "$GITHUB_OUTPUT"
          echo "page_size=${page_size}" >> "$GITHUB_OUTPUT"
          echo "pages=${pages}" >> "$GITHUB_OUTPUT"

      - name: Initialize database schema
        shell: bash
        run: |
          set -euo pipefail
          python scripts/init_database.py

      - name: Run clinical trials backfill
        id: backfill
        shell: bash
        env:
          BACKFILL_QUERY: ${{ steps.config.outputs.query }}
          BACKFILL_STATUS: ${{ steps.config.outputs.status }}
          BACKFILL_PHASE: ${{ steps.config.outputs.phase }}
          BACKFILL_STUDY_TYPE: ${{ steps.config.outputs.study_type }}
          BACKFILL_SPONSOR: ${{ steps.config.outputs.sponsor }}
          BACKFILL_CONDITION: ${{ steps.config.outputs.condition }}
          BACKFILL_INTERVENTION: ${{ steps.config.outputs.intervention }}
          BACKFILL_INTERVENTION_TYPE: ${{ steps.config.outputs.intervention_type }}
          BACKFILL_COUNTRY: ${{ steps.config.outputs.country }}
          BACKFILL_HAS_RESULTS: ${{ steps.config.outputs.has_results }}
          BACKFILL_WITHOUT_RESULTS: ${{ steps.config.outputs.without_results }}
          BACKFILL_PAGE_SIZE: ${{ steps.config.outputs.page_size }}
          BACKFILL_PAGES: ${{ steps.config.outputs.pages }}
        run: |
          set -euo pipefail
          mkdir -p logs

          printf '%s\n' "Running command: python scripts/run_scheduled_backfill.py" | tee logs/backfill.log
          set +e
          output="$(python scripts/run_scheduled_backfill.py 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output" | tee -a logs/backfill.log
          printf '%s\n' "$output" > logs/backfill_output.json
          exit "$status"

      - name: Publish workflow summary
        if: always()
        shell: bash
        env:
          BACKFILL_OUTPUT_PATH: logs/backfill_output.json
        run: |
          set -euo pipefail

          {
            echo "## Scheduled Backfill"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Query: \`${{ steps.config.outputs.query || '(none)' }}\`"
            echo "- Status: \`${{ steps.config.outputs.status }}\`"
            echo "- Phase: \`${{ steps.config.outputs.phase || '(none)' }}\`"
            echo "- Study type: \`${{ steps.config.outputs.study_type }}\`"
            echo "- Sponsor: \`${{ steps.config.outputs.sponsor || '(none)' }}\`"
            echo "- Condition: \`${{ steps.config.outputs.condition || '(none)' }}\`"
            echo "- Country: \`${{ steps.config.outputs.country || '(none)' }}\`"
            echo "- Has results: \`${{ steps.config.outputs.has_results }}\`"
            echo "- Without results: \`${{ steps.config.outputs.without_results }}\`"
            echo "- Page size: \`${{ steps.config.outputs.page_size }}\`"
            echo "- Pages: \`${{ steps.config.outputs.pages }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f logs/backfill_output.json ]; then
            python scripts/publish_backfill_summary.py
          fi

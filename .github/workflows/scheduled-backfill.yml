name: Scheduled Backfill

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      query:
        description: "Optional free-text ClinicalTrials.gov query"
        required: false
        default: ""
        type: string
      status:
        description: "Overall status filter"
        required: false
        default: "COMPLETED"
        type: string
      phase:
        description: "Optional phase filter such as PHASE1, PHASE2, or PHASE3"
        required: false
        default: ""
        type: string
      study_type:
        description: "Study type filter"
        required: false
        default: ""
        type: string
      sponsor:
        description: "Optional sponsor filter"
        required: false
        default: ""
        type: string
      condition:
        description: "Condition filter"
        required: false
        default: "Neoplasms"
        type: string
      intervention:
        description: "Optional intervention filter"
        required: false
        default: ""
        type: string
      intervention_type:
        description: "Optional intervention type filter"
        required: false
        default: ""
        type: string
      country:
        description: "Optional country filter"
        required: false
        default: ""
        type: string
      has_results:
        description: "Restrict to studies with results"
        required: false
        default: true
        type: boolean
      without_results:
        description: "Restrict to studies without results"
        required: false
        default: false
        type: boolean
      page_size:
        description: "Page size per API request"
        required: false
        default: "50"
        type: string
      pages:
        description: "Maximum pages to ingest"
        required: false
        default: "2"
        type: string

concurrency:
  group: scheduled-backfill-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:
  backfill-clinical-trials:
    name: Backfill Clinical Trials
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
      DATABASE_POOL_ENABLED: "false"
      DATABASE_APPLICATION_NAME: btq-backfill
      SEC_CONTACT_NAME: ${{ secrets.SEC_CONTACT_NAME }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
      INPUT_QUERY: ${{ inputs.query }}
      INPUT_STATUS: ${{ inputs.status }}
      INPUT_PHASE: ${{ inputs.phase }}
      INPUT_STUDY_TYPE: ${{ inputs.study_type }}
      INPUT_SPONSOR: ${{ inputs.sponsor }}
      INPUT_CONDITION: ${{ inputs.condition }}
      INPUT_INTERVENTION: ${{ inputs.intervention }}
      INPUT_INTERVENTION_TYPE: ${{ inputs.intervention_type }}
      INPUT_COUNTRY: ${{ inputs.country }}
      INPUT_HAS_RESULTS: ${{ inputs.has_results }}
      INPUT_WITHOUT_RESULTS: ${{ inputs.without_results }}
      INPUT_PAGE_SIZE: ${{ inputs.page_size }}
      INPUT_PAGES: ${{ inputs.pages }}
      DEFAULT_QUERY: ${{ vars.BACKFILL_QUERY }}
      DEFAULT_STATUS: ${{ vars.BACKFILL_STATUS }}
      DEFAULT_PHASE: ${{ vars.BACKFILL_PHASE }}
      DEFAULT_STUDY_TYPE: ${{ vars.BACKFILL_STUDY_TYPE }}
      DEFAULT_SPONSOR: ${{ vars.BACKFILL_SPONSOR }}
      DEFAULT_CONDITION: ${{ vars.BACKFILL_CONDITION }}
      DEFAULT_INTERVENTION: ${{ vars.BACKFILL_INTERVENTION }}
      DEFAULT_INTERVENTION_TYPE: ${{ vars.BACKFILL_INTERVENTION_TYPE }}
      DEFAULT_COUNTRY: ${{ vars.BACKFILL_COUNTRY }}
      DEFAULT_HAS_RESULTS: ${{ vars.BACKFILL_HAS_RESULTS }}
      DEFAULT_WITHOUT_RESULTS: ${{ vars.BACKFILL_WITHOUT_RESULTS }}
      DEFAULT_PAGE_SIZE: ${{ vars.BACKFILL_PAGE_SIZE }}
      DEFAULT_PAGES: ${{ vars.BACKFILL_PAGES }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SEC_CONTACT_NAME:-}" ] || [ -z "${SEC_CONTACT_EMAIL:-}" ]; then
            echo "SEC_CONTACT_NAME and SEC_CONTACT_EMAIL must be configured as GitHub secrets."
            exit 1
          fi

          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret detected."
            exit 0
          fi

          if [ -z "${DB_HOST:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_USER:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
            echo "Database configuration is missing. Set DATABASE_URL or DB_HOST/DB_NAME/DB_USER/DB_PASSWORD secrets."
            exit 1
          fi

          echo "Database component secrets detected."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve effective backfill configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          query="${INPUT_QUERY:-${DEFAULT_QUERY:-}}"
          status="${INPUT_STATUS:-${DEFAULT_STATUS:-COMPLETED}}"
          phase="${INPUT_PHASE:-${DEFAULT_PHASE:-}}"
          study_type="${INPUT_STUDY_TYPE:-${DEFAULT_STUDY_TYPE:-}}"
          sponsor="${INPUT_SPONSOR:-${DEFAULT_SPONSOR:-}}"
          condition="${INPUT_CONDITION:-${DEFAULT_CONDITION:-Neoplasms}}"
          intervention="${INPUT_INTERVENTION:-${DEFAULT_INTERVENTION:-}}"
          intervention_type="${INPUT_INTERVENTION_TYPE:-${DEFAULT_INTERVENTION_TYPE:-}}"
          country="${INPUT_COUNTRY:-${DEFAULT_COUNTRY:-}}"
          has_results="${INPUT_HAS_RESULTS:-${DEFAULT_HAS_RESULTS:-true}}"
          without_results="${INPUT_WITHOUT_RESULTS:-${DEFAULT_WITHOUT_RESULTS:-false}}"
          page_size="${INPUT_PAGE_SIZE:-${DEFAULT_PAGE_SIZE:-50}}"
          pages="${INPUT_PAGES:-${DEFAULT_PAGES:-2}}"

          echo "query=${query}" >> "$GITHUB_OUTPUT"
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "phase=${phase}" >> "$GITHUB_OUTPUT"
          echo "study_type=${study_type}" >> "$GITHUB_OUTPUT"
          echo "sponsor=${sponsor}" >> "$GITHUB_OUTPUT"
          echo "condition=${condition}" >> "$GITHUB_OUTPUT"
          echo "intervention=${intervention}" >> "$GITHUB_OUTPUT"
          echo "intervention_type=${intervention_type}" >> "$GITHUB_OUTPUT"
          echo "country=${country}" >> "$GITHUB_OUTPUT"
          echo "has_results=${has_results}" >> "$GITHUB_OUTPUT"
          echo "without_results=${without_results}" >> "$GITHUB_OUTPUT"
          echo "page_size=${page_size}" >> "$GITHUB_OUTPUT"
          echo "pages=${pages}" >> "$GITHUB_OUTPUT"

      - name: Initialize database schema
        shell: bash
        run: |
          set -euo pipefail
          python scripts/init_database.py

      - name: Run clinical trials backfill
        id: backfill
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs

          cmd=(python scripts/backfill_clinical_trials.py)
          cmd+=(--page-size "${{ steps.config.outputs.page_size }}")
          cmd+=(--pages "${{ steps.config.outputs.pages }}")

          if [ -n "${{ steps.config.outputs.query }}" ]; then
            cmd+=(--query "${{ steps.config.outputs.query }}")
          fi
          if [ -n "${{ steps.config.outputs.status }}" ]; then
            cmd+=(--status "${{ steps.config.outputs.status }}")
          fi
          if [ -n "${{ steps.config.outputs.phase }}" ]; then
            cmd+=(--phase "${{ steps.config.outputs.phase }}")
          fi
          if [ -n "${{ steps.config.outputs.study_type }}" ]; then
            cmd+=(--study-type "${{ steps.config.outputs.study_type }}")
          fi
          if [ -n "${{ steps.config.outputs.sponsor }}" ]; then
            cmd+=(--sponsor "${{ steps.config.outputs.sponsor }}")
          fi
          if [ -n "${{ steps.config.outputs.condition }}" ]; then
            cmd+=(--condition "${{ steps.config.outputs.condition }}")
          fi
          if [ -n "${{ steps.config.outputs.intervention }}" ]; then
            cmd+=(--intervention "${{ steps.config.outputs.intervention }}")
          fi
          if [ -n "${{ steps.config.outputs.intervention_type }}" ]; then
            cmd+=(--intervention-type "${{ steps.config.outputs.intervention_type }}")
          fi
          if [ -n "${{ steps.config.outputs.country }}" ]; then
            cmd+=(--country "${{ steps.config.outputs.country }}")
          fi
          if [ "${{ steps.config.outputs.has_results }}" = "true" ]; then
            cmd+=(--has-results)
          fi
          if [ "${{ steps.config.outputs.without_results }}" = "true" ]; then
            cmd+=(--without-results)
          fi

          printf 'Running command: %q ' "${cmd[@]}" | tee logs/backfill.log
          printf '\n' | tee -a logs/backfill.log

          output="$("${cmd[@]}")"
          printf '%s\n' "$output" | tee -a logs/backfill.log
          printf '%s\n' "$output" > logs/backfill_output.json

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "## Scheduled Backfill"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Query: \`${{ steps.config.outputs.query || '(none)' }}\`"
            echo "- Status: \`${{ steps.config.outputs.status }}\`"
            echo "- Phase: \`${{ steps.config.outputs.phase || '(none)' }}\`"
            echo "- Study type: \`${{ steps.config.outputs.study_type }}\`"
            echo "- Sponsor: \`${{ steps.config.outputs.sponsor || '(none)' }}\`"
            echo "- Condition: \`${{ steps.config.outputs.condition || '(none)' }}\`"
            echo "- Country: \`${{ steps.config.outputs.country || '(none)' }}\`"
            echo "- Has results: \`${{ steps.config.outputs.has_results }}\`"
            echo "- Without results: \`${{ steps.config.outputs.without_results }}\`"
            echo "- Page size: \`${{ steps.config.outputs.page_size }}\`"
            echo "- Pages: \`${{ steps.config.outputs.pages }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f logs/backfill_output.json ]; then
            cat > /tmp/backfill_summary.py <<'PY'
            import json
            import os
            from pathlib import Path

            payload = json.loads(Path("logs/backfill_output.json").read_text(encoding="utf-8"))
            summary_lines = [
                "",
                "### Backfill Result",
                "",
                f"- Status: `{payload.get('status', 'unknown')}`",
                f"- Fetched records: `{payload.get('fetched_records', 'unknown')}`",
                f"- Upserted records: `{payload.get('upserted_records', 'unknown')}`",
            ]
            with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
                handle.write("\n".join(summary_lines) + "\n")
            PY
            python /tmp/backfill_summary.py
          fi

      - name: Upload backfill logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-backfill-logs
          path: logs/
          if-no-files-found: ignore
          retention-days: 14

name: Historical Dataset Backfill

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum stored clinical trials to select"
        required: false
        default: "25"
        type: string
      offset:
        description: "Offset into stored clinical trials"
        required: false
        default: "0"
        type: string
      batch_size:
        description: "Optional batch size for processing"
        required: false
        default: ""
        type: string
      max_batches:
        description: "Optional maximum number of batches to process"
        required: false
        default: ""
        type: string
      approval_limit:
        description: "Maximum FDA approval records to include per analysis"
        required: false
        default: "5"
        type: string
      market_pre_days:
        description: "Trading days before the event date"
        required: false
        default: "5"
        type: string
      market_post_days:
        description: "Trading days after the event date"
        required: false
        default: "5"
        type: string
      status:
        description: "Overall status filter"
        required: false
        default: "COMPLETED"
        type: string
      sponsor:
        description: "Optional sponsor name filter"
        required: false
        default: ""
        type: string
      phase:
        description: "Optional phase filter"
        required: false
        default: ""
        type: string
      study_type:
        description: "Optional study type filter"
        required: false
        default: ""
        type: string
      therapeutic_area:
        description: "Optional therapeutic area filter"
        required: false
        default: ""
        type: string
      has_results:
        description: "Restrict to stored trials with results"
        required: false
        default: true
        type: boolean
      without_results:
        description: "Restrict to stored trials without results"
        required: false
        default: false
        type: boolean
      include_existing:
        description: "Reprocess trials that already have historical event rows"
        required: false
        default: false
        type: boolean

concurrency:
  group: historical-dataset-backfill-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  historical-dataset-backfill:
    name: Historical Dataset Backfill
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_SSLMODE: ${{ secrets.DB_SSLMODE }}
      DATABASE_POOL_ENABLED: "false"
      DATABASE_APPLICATION_NAME: btq-historical-dataset-backfill
      SEC_CONTACT_NAME: ${{ secrets.SEC_CONTACT_NAME }}
      SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
      HISTORICAL_DATASET_LIMIT: ${{ inputs.limit }}
      HISTORICAL_DATASET_OFFSET: ${{ inputs.offset }}
      HISTORICAL_DATASET_BATCH_SIZE: ${{ inputs.batch_size }}
      HISTORICAL_DATASET_MAX_BATCHES: ${{ inputs.max_batches }}
      HISTORICAL_DATASET_APPROVAL_LIMIT: ${{ inputs.approval_limit }}
      HISTORICAL_DATASET_MARKET_PRE_DAYS: ${{ inputs.market_pre_days }}
      HISTORICAL_DATASET_MARKET_POST_DAYS: ${{ inputs.market_post_days }}
      HISTORICAL_DATASET_STATUS: ${{ inputs.status }}
      HISTORICAL_DATASET_SPONSOR: ${{ inputs.sponsor }}
      HISTORICAL_DATASET_PHASE: ${{ inputs.phase }}
      HISTORICAL_DATASET_STUDY_TYPE: ${{ inputs.study_type }}
      HISTORICAL_DATASET_THERAPEUTIC_AREA: ${{ inputs.therapeutic_area }}
      HISTORICAL_DATASET_HAS_RESULTS: ${{ inputs.has_results }}
      HISTORICAL_DATASET_WITHOUT_RESULTS: ${{ inputs.without_results }}
      HISTORICAL_DATASET_INCLUDE_EXISTING: ${{ inputs.include_existing }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SEC_CONTACT_NAME:-}" ] || [ -z "${SEC_CONTACT_EMAIL:-}" ]; then
            echo "SEC_CONTACT_NAME and SEC_CONTACT_EMAIL must be configured as GitHub secrets."
            exit 1
          fi

          if [ -n "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL secret detected."
            exit 0
          fi

          if [ -z "${DB_HOST:-}" ] || [ -z "${DB_NAME:-}" ] || [ -z "${DB_USER:-}" ] || [ -z "${DB_PASSWORD:-}" ]; then
            echo "Database configuration is missing. Set DATABASE_URL or DB_HOST/DB_NAME/DB_USER/DB_PASSWORD secrets."
            exit 1
          fi

          echo "Database component secrets detected."

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Initialize database schema
        shell: bash
        run: |
          set -euo pipefail
          python scripts/init_database.py

      - name: Run historical dataset backfill
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs

          printf '%s\n' "Running command: python scripts/run_historical_dataset_backfill.py" | tee logs/historical_dataset_backfill.log
          set +e
          output="$(python scripts/run_historical_dataset_backfill.py 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output" | tee -a logs/historical_dataset_backfill.log
          printf '%s\n' "$output" > logs/historical_dataset_backfill_output.json
          exit "$status"

      - name: Publish workflow summary
        if: always()
        shell: bash
        env:
          HISTORICAL_DATASET_OUTPUT_PATH: logs/historical_dataset_backfill_output.json
        run: |
          set -euo pipefail

          {
            echo "## Historical Dataset Backfill"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Limit: \`${{ inputs.limit }}\`"
            echo "- Offset: \`${{ inputs.offset }}\`"
            echo "- Batch size: \`${{ inputs.batch_size || '(auto)' }}\`"
            echo "- Max batches: \`${{ inputs.max_batches || '(all)' }}\`"
            echo "- Approval limit: \`${{ inputs.approval_limit }}\`"
            echo "- Market pre days: \`${{ inputs.market_pre_days }}\`"
            echo "- Market post days: \`${{ inputs.market_post_days }}\`"
            echo "- Status filter: \`${{ inputs.status }}\`"
            echo "- Sponsor filter: \`${{ inputs.sponsor || '(none)' }}\`"
            echo "- Phase filter: \`${{ inputs.phase || '(none)' }}\`"
            echo "- Study type filter: \`${{ inputs.study_type || '(none)' }}\`"
            echo "- Therapeutic area filter: \`${{ inputs.therapeutic_area || '(none)' }}\`"
            echo "- Has results: \`${{ inputs.has_results }}\`"
            echo "- Without results: \`${{ inputs.without_results }}\`"
            echo "- Include existing: \`${{ inputs.include_existing }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f logs/historical_dataset_backfill_output.json ]; then
            python scripts/publish_historical_dataset_backfill_summary.py
          fi
